version: "2"

linters:
  enable:
    - bodyclose
    - errcheck
    - gocritic
    - goimports
    - gosimple
    - govet
    - ineffassign
    - noctx
    - nolintlint
    - staticcheck
    - unconvert
    - unparam
    - unused

linters-settings:
  goimports:
    local-prefixes: github.com/bernardoforcillo/drops
  gocritic:
    enabled-tags:
      - diagnostic
      - style
    disabled-checks:
      - commentFormatting  # not enforced here
      - ifElseChain
  unparam:
    check-exported: false  # exported API params are intentional

issues:
  # Don't report shadowing in test files — common Go test pattern.
  exclude-rules:
    - path: "_test\\.go"
      linters: [govet]
      text: "shadow"
    # Example test files may have unused exported symbols.
    - path: "example_test\\.go"
      linters: [unused, unparam]
  # Raise the line limit a bit for table-driven tests.
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  tests: true
